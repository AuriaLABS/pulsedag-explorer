upstream pulsedag_rpc {
    server pulsedagd:8080;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /rpc/api/v1/status {
        proxy_pass http://pulsedag_rpc/api/v1/status;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /rpc/api/v1/blocks/recent {
        proxy_pass http://pulsedag_rpc/api/v1/blocks/recent;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location ~ ^/rpc/api/v1/blocks/([0-9A-Fa-f]{16,128})/overview$ {
        proxy_pass http://pulsedag_rpc/api/v1/blocks/$1/overview;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /rpc/api/v1/sync/status {
        proxy_pass http://pulsedag_rpc/api/v1/sync/status;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /rpc/api/v1/mempool {
        proxy_pass http://pulsedag_rpc/api/v1/mempool;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /rpc/api/v1/pow/health {
        proxy_pass http://pulsedag_rpc/api/v1/pow/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location ~ ^/rpc/api/v1/search/([^/]+)$ {
        proxy_pass http://pulsedag_rpc/api/v1/search/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location ^~ /rpc/ {
        return 404;
    }
}
